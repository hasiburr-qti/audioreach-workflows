---
name: AWS S3 Exchanger
description: Upload and download files from AWS S3

inputs:
  s3_bucket:
    description: S3 Bucket Name
    required: true
  local_file:
    description: Local file paths
    required: false
    default: ''
  download_filename:
    description: The name of the SDK
    required: true
    default: ''
  location:
    description: The location of the SDK
    required: true
    default: ''
  mode:
    description: Mode of operation (upload/download)
    required: true
    default: upload
  upload_location:
    description: Upload location
    required: false
    default: ${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.run_id }}-${{ github.run_attempt }}/

runs:
  using: "composite"
  steps:

    - name: Sync Data
      id: sync_data
      shell: bash
      env:
        UPLOAD_LOCATION: ${{ inputs.upload_location }}
      run: |
        case "${{ inputs.mode }}" in
          upload)
            echo "::group::$(printf '__________ %-100s' 'Process' | tr ' ' _)"
            echo "Uploading file to S3 bucket..."
            aws s3 cp "${{ inputs.local_file }}" s3://${{ inputs.s3_bucket }}/${{ inputs.location }}/${{ env.UPLOAD_LOCATION }}${{ env.IMAGE_NAME }}/
            echo "Uploaded ${{ inputs.local_file }} to s3://${{ inputs.s3_bucket }}/${{ inputs.location }}/${{ env.UPLOAD_LOCATION }}${{ env.IMAGE_NAME }}/"
            echo "::endgroup::"
            echo "Creating Pre-signed URL for ${{ inputs.local_file }}..."
            filename="$(basename "${{ inputs.local_file }}")"
            echo "Filename: $filename"
            presigned_url="$(aws s3 presign s3://${{ inputs.s3_bucket }}/${{ inputs.location }}/${{ env.UPLOAD_LOCATION }}${{ env.IMAGE_NAME }}/$filename --expires-in 3600)"
            echo "Pre-signed URL: $presigned_url"

            # Make URL available as a step output (fixed key)
            echo "presigned_url=${presigned_url}" >> "$GITHUB_OUTPUT"

            # Also write the URL into a uniquely named file for artifact download
            echo "${presigned_url}" > "${{ github.workspace }}/presigned_urls/presigned_url_${{ env.IMAGE_NAME }}.txt"
            ;;
          download)
            #Download The required file from s3
            echo "::group::$(printf '__________ %-100s' 'Process' | tr ' ' _)"
            echo "Downloading files from S3 bucket..."
            aws s3 cp s3://${{ inputs.s3_bucket }}/${{ inputs.location }}/${{ inputs.download_filename }} .
            echo "::endgroup::"
            chmod 777 ${{ inputs.download_filename }}
            echo "Downloaded ${{ inputs.download_filename }} from s3://${{ inputs.s3_bucket }}/${{ inputs.location }}"
            ;;
          *)
            echo "Invalid mode. Use 'upload' or 'download'."
            exit 1
            ;;
        esac

    - name: Upload Pre-signed URL
      id: upload_presigned_url
      if: ${{ inputs.mode == 'upload' }}
      uses: actions/upload-artifact@v4
      with:
        name: presigned_url_${{ env.IMAGE_NAME }}.txt
        path: ${{ github.workspace }}/presigned_urls/presigned_url_${{ env.IMAGE_NAME }}.txt
        retention-days: 1
